set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

run '~/.tmux/plugins/tpm/tpm'
# Reload config
bind r source-file ~/.tmux.conf \; display "tmux reloaded"

# Change prefix from Ctrl+b to Ctrl+Space
unbind C-b
set -g prefix C-Space

# Enable mouse support
set -g mouse on

# Faster key response
set -sg escape-time 0

# Split panes
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Vim-like pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1

# --- Purple status bar ---
set -g status-position bottom
set -g status-style bg=colour54,fg=colour255

# Left: session name (purple accent)
set -g status-left "#[fg=colour141] #S "

# Right: time and date (soft purple/gray)
set -g status-right "#[fg=colour183]%H:%M #[fg=colour245]%d-%m-%Y"

# tmux-sessionizer bind-key
unbind f
bind-key -r f run-shell "tmux neww ~/bin/tmux-sessionizer"
# Use system clipboard for copy
set-option -g set-clipboard on

# Yank to system clipboard using xclip
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -sel clip -i"

# Prevent exiting copy mode when dragging with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane
# Enable vi mode for copy mode (Prefix + [ enters copy mode)
set-window-option -g mode-keys vi

# Copy mode bindings
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"

# Paste binding (Prefix + P)
bind P paste-buffer

# Use system clipboard for copy
set-option -g set-clipboard on

# Yank to system clipboard using xclip
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -sel clip -i"

# Prevent exiting copy mode when dragging with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane
